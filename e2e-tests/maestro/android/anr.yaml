appId: ${APP_ID}
---
- launchApp
- extendedWaitUntil:
    visible: "Native Android"
    timeout: 30000
- tapOn: "Native Android"
- scrollUntilVisible:
    element:
      text: "Infinite Loop"
- tapOn: "Infinite Loop"

# Relaunch (no clearState) so the SDK uploads the ANR
- launchApp
- assertVisible: "Native Android"
