appId: ${APP_ID}
---
- launchApp
- extendedWaitUntil:
    visible: "Native Android"
    timeout: 30000
- tapOn: "Native Android"
- scrollUntilVisible:
    element:
      text: "Single Exception"
- tapOn: "Single Exception"

# Relaunch (no clearState) so the SDK uploads the crash
- launchApp
- assertVisible: "Native Android"
