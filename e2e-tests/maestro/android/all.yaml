appId: ${APP_ID}
---
- clearState

- runFlow: crash.yaml
- runFlow: anr.yaml
- runFlow: bug_report.yaml

# Relaunch the app twice from background
# to give enough time to send all data to
# the server
- pressKey: "Home"
- launchApp:
    appId: ${APP_ID}
    stopApp: false
- extendedWaitUntil:
    visible:
      text: "__maestro_wait_sentinel__"
    timeout: 15000
    optional: true

- pressKey: "Home"
- launchApp:
    appId: ${APP_ID}
    stopApp: false
- extendedWaitUntil:
    visible:
      text: "__maestro_wait_sentinel__"
    timeout: 15000
    optional: true

- pressKey: "Home"
