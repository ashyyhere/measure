appId: ${APP_ID}
---
- launchApp
- extendedWaitUntil:
    visible: "Native Android"
    timeout: 30000
- tapOn: "Native Android"
- scrollUntilVisible:
    element:
      text: "Launch Bug Report"
- tapOn: "Launch Bug Report"
- tapOn: "Briefly describe the issue you are facing"
- inputText: "e2e-android-bug-report"
# Dismiss the soft keyboard so it doesn't intercept taps on the toolbar.
- hideKeyboard
- tapOn: "Add more images"
# The Compose-based Photo Picker on API 33+ exposes thumbnails only via their
# content description; the recipe's resource-id targets the older provider.
- tapOn:
    text: "Photo taken on.*"
    index: 0
# Confirm button only appears when the picker opens in multi-select mode.
- tapOn:
    text: "Done"
    optional: true
- tapOn: "Send"
