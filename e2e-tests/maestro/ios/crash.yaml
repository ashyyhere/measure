appId: ${APP_ID}
---
- launchApp
- extendedWaitUntil:
    visible: "Native iOS"
    timeout: 30000
- tapOn: "Native iOS"
- scrollUntilVisible:
    element:
      text: "NSException"
- tapOn: "NSException"

# Relaunch (no clearState) so the SDK uploads the crash
- launchApp
- assertVisible: "Native iOS"
